<section id="game" class="game-section">
  <div class="section-container">
    <h2 class="section-title">
      <span class="title-decorator">//</span>
      GPU Defender
    </h2>
    <p class="section-subtitle">Defend your GPU cluster from bugs, errors, and OOM crashes!</p>

    <div class="game-wrapper">
      <div class="game-hud">
        <div class="hud-item">
          <span class="hud-label">SCORE</span>
          <span class="hud-value">{{ score() }}</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">LIVES</span>
          <span class="hud-value lives">
            @for (l of [1,2,3]; track l) {
              <span class="heart" [class.lost]="l > lives()">&#9829;</span>
            }
          </span>
        </div>
        <div class="hud-item">
          <span class="hud-label">HIGH</span>
          <span class="hud-value">{{ highScore() }}</span>
        </div>
        <button class="sound-toggle" (click)="toggleSound()">
          <mat-icon>{{ soundEnabled() ? 'volume_up' : 'volume_off' }}</mat-icon>
        </button>
      </div>

      <div class="canvas-container">
        <canvas #gameCanvas></canvas>
        @if (gameState() !== 'playing') {
          <div class="overlay-actions">
            <button mat-flat-button class="start-btn" (click)="startGame()">
              <mat-icon>{{ gameState() === 'over' ? 'replay' : 'rocket_launch' }}</mat-icon>
              {{ gameState() === 'over' ? 'RETRY' : 'START GAME' }}
            </button>
          </div>
        }
      </div>

      <div class="game-controls">
        <span><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> or <kbd>&larr;</kbd><kbd>&uarr;</kbd><kbd>&darr;</kbd><kbd>&rarr;</kbd> Move</span>
        <span><kbd>SPACE</kbd> Shoot</span>
      </div>

      <div class="touch-controls">
        <div class="touch-dpad">
          <div class="dpad-btn empty"></div>
          <button class="dpad-btn" (touchstart)="onTouchStart('ArrowUp')" (touchend)="onTouchEnd('ArrowUp')">&#9650;</button>
          <div class="dpad-btn empty"></div>
          <button class="dpad-btn" (touchstart)="onTouchStart('ArrowLeft')" (touchend)="onTouchEnd('ArrowLeft')">&#9664;</button>
          <div class="dpad-btn empty"></div>
          <button class="dpad-btn" (touchstart)="onTouchStart('ArrowRight')" (touchend)="onTouchEnd('ArrowRight')">&#9654;</button>
          <div class="dpad-btn empty"></div>
          <button class="dpad-btn" (touchstart)="onTouchStart('ArrowDown')" (touchend)="onTouchEnd('ArrowDown')">&#9660;</button>
          <div class="dpad-btn empty"></div>
        </div>
        <div class="touch-fire">
          <button class="fire-btn" (touchstart)="onTouchStart(' ')" (touchend)="onTouchEnd(' ')">FIRE</button>
        </div>
      </div>
    </div>
  </div>
</section>
